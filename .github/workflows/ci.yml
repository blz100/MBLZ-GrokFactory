name: CI Pipeline

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - run: pip install -r requirements.txt
    - run: echo 'Basic CI passed - add tests as needed'