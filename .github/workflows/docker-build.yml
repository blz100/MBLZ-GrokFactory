name: Docker Build & Push to ACR with Key Vault

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: youracr.azurecr.io  # ← UPDATE THIS
  IMAGE_NAME: mblz-grokfactory

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Get Secrets from Key Vault
      uses: azure/cli@v2
      id: kv
      with:
        inlineScript: |
          az keyvault secret show --name XAI-API-KEY --vault-name ${{ secrets.KEYVAULT_NAME }} --query value -o tsv || echo 'secret-missing'

    - name: Login to ACR
      uses: azure/docker-login@v2
      with:
        login-server: ${{ env.REGISTRY }}

    - name: Docker Metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build & Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Azure Container App
      if: github.ref == 'refs/heads/main'
      uses: azure/container-apps-deploy-action@v1
      with:
        appSourcePath: .
        acrName: youracr  # UPDATE
        containerAppName: grokfactory-app  # UPDATE
        resourceGroup: your-resource-group  # UPDATE
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}